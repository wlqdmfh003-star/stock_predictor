name: 주식 예측 자동 실행 v7.2

on:
  schedule:
    - cron: '30 21 * * 1-5'  # 한국시간 06:30 (월~금)
    - cron: '0 3 * * 1-5'    # 한국시간 12:00 (월~금)
    - cron: '0 8 * * 1-5'    # 한국시간 17:00 (월~금)
    - cron: '30 14 * * 1-5'  # 한국시간 23:30 (월~금)
  workflow_dispatch:

jobs:
  run-prediction:
    runs-on: ubuntu-latest
    timeout-minutes: 110

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: 코드 받기
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Python 설치
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 패키지 설치
      run: |
        pip install \
          streamlit pandas numpy yfinance \
          xgboost lightgbm catboost torch \
          scikit-learn requests beautifulsoup4 plotly \
          transformers sentencepiece huggingface_hub scipy \
          pykrx

    - name: 분석 실행
      env:
        KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
        KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
        KIS_ACCOUNT: ${{ secrets.KIS_ACCOUNT }}
        NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
        NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        DART_API_KEY: ${{ secrets.DART_API_KEY }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        TRANSFORMERS_VERBOSITY: error
        HF_HUB_DISABLE_PROGRESS_BARS: "1"
      run: |
        python << 'PYEOF'
        import os, sys
        sys.path.insert(0, '.')

        kis_key    = os.environ.get('KIS_APP_KEY', '')
        kis_secret = os.environ.get('KIS_APP_SECRET', '')
        kis_acct   = os.environ.get('KIS_ACCOUNT', '')
        naver_id   = os.environ.get('NAVER_CLIENT_ID', '')
        naver_sec  = os.environ.get('NAVER_CLIENT_SECRET', '')
        dart_key   = os.environ.get('DART_API_KEY', '')
        tg_token   = os.environ.get('TELEGRAM_TOKEN', '')
        tg_chat_id = os.environ.get('TELEGRAM_CHAT_ID', '')

        print('=== v7.2 자동 분석 시작 ===')

        # .cache 폴더 현황 확인
        import os
        os.makedirs('.cache', exist_ok=True)
        db_path = '.cache/learning.db'
        if os.path.exists(db_path):
            size = os.path.getsize(db_path)
            print(f'✅ 기존 학습 DB 발견: {size:,} bytes')
        else:
            print('ℹ️ 학습 DB 없음 - 새로 시작')

        # 데이터 수집
        from utils.data_fetcher import DataFetcher
        df = DataFetcher(market='KOSPI+KOSDAQ', top_n=100).fetch_all_parallel()
        print(f'종목 수집: {len(df)}개')

        # 기술적 지표
        try:
            from utils.indicators import TechnicalIndicators
            df = TechnicalIndicators().calculate_all(df)
            print('기술적 지표 완료')
        except Exception as e:
            print(f'[주의] 기술적 지표: {e}')

        # KIS 수급
        try:
            if kis_key and kis_secret:
                from utils.kis_api import KISApi
                df = KISApi(kis_key, kis_secret, kis_acct).get_institution_data(df)
                print('KIS 수급 완료')
        except Exception as e:
            print(f'[주의] KIS: {e}')

        # 뉴스 감성
        try:
            from utils.news_sentiment import NewsSentiment
            df = NewsSentiment(naver_id, naver_sec).analyze(df)
            print('뉴스 감성 완료')
        except Exception as e:
            print(f'[주의] 뉴스: {e}')

        # 재무
        try:
            from utils.fundamental import FundamentalAnalyzer
            df = FundamentalAnalyzer().fetch_and_score(df)
            print('재무 완료')
        except Exception as e:
            print(f'[주의] 재무: {e}')

        # DART
        try:
            from utils.dart_disclosure import DartDisclosure
            df = DartDisclosure(dart_key).fetch_and_score(df)
            print('DART 완료')
        except Exception as e:
            print(f'[주의] DART: {e}')

        # 공매도
        try:
            from utils.short_selling import ShortSelling
            df = ShortSelling().fetch_and_score(df)
            print('공매도 완료')
        except Exception as e:
            print(f'[주의] 공매도: {e}')

        # 52주 신고가
        try:
            from utils.high_low_52week import HighLow52Week
            df = HighLow52Week().fetch_and_score(df)
            print('52주 완료')
        except Exception as e:
            print(f'[주의] 52주: {e}')

        # 매크로
        try:
            from utils.macro_indicators import MacroIndicators
            mi = MacroIndicators()
            macro_data = mi.fetch()
            df = mi.apply_to_stocks(df, macro_data)
            print('매크로 완료')
        except Exception as e:
            print(f'[주의] 매크로: {e}')

        # 미국 증시
        try:
            from utils.us_market import USMarket
            um = USMarket()
            df = um.apply_to_stocks(df, um.fetch())
            print('미국 증시 완료')
        except Exception as e:
            print(f'[주의] 미국 증시: {e}')

        # 섹터 분석
        try:
            from utils.sector_analysis import SectorAnalysis
            df = SectorAnalysis().analyze(df)
            print('섹터 완료')
        except Exception as e:
            print(f'[주의] 섹터: {e}')

        # 실적 캘린더
        try:
            from utils.earnings_calendar import EarningsCalendar
            df = EarningsCalendar().fetch_and_score(df)
            print('실적 캘린더 완료')
        except Exception as e:
            print(f'[주의] 실적 캘린더: {e}')

        # 거래량 탐지
        try:
            from utils.volume_detector import VolumeDetector
            df = VolumeDetector().detect(df)
            print('거래량 완료')
        except Exception as e:
            print(f'[주의] 거래량: {e}')

        # 옵션 전략
        try:
            from utils.option_strategy import OptionStrategy
            df = OptionStrategy().analyze(df)
            print('옵션 완료')
        except Exception as e:
            print(f'[주의] 옵션: {e}')

        # LSTM
        try:
            from models.lstm_model import LSTMPredictor
            df = LSTMPredictor().predict_batch(df)
            print('LSTM 완료')
        except Exception as e:
            print(f'[주의] LSTM: {e}')

        # 앙상블
        try:
            from models.ensemble_model import EnsembleModel
            df = EnsembleModel().predict_batch(df)
            print('앙상블 완료')
        except Exception as e:
            print(f'[주의] 앙상블: {e}')

        # 최종 점수
        from models.multi_factor import MultiFactorScorer
        df = MultiFactorScorer().score(df)
        df = df.sort_values('rise_prob', ascending=False).reset_index(drop=True)
        print('최종 점수 완료')

        # 자기학습
        from utils.learning_tracker import LearningTracker
        tracker = LearningTracker()
        tracker.update_results(df)
        saved = tracker.save_predictions(df)
        stats  = tracker.get_stats()
        print(f'저장: {saved}건 / 누적: {stats["total"]}건 / 적중률: {stats["hit_rate"]}%')

        # ★ 스태킹 메타모델 가중치 업데이트 (20건 이상 시)
        try:
            from models.ensemble_model import EnsembleModel
            import sqlite3, os, json
            db_path = '.cache/learning.db'
            if os.path.exists(db_path):
                conn = sqlite3.connect(db_path)
                rows = conn.execute(
                    "SELECT ensemble_score, lstm_score, hit FROM predictions "
                    "WHERE hit IS NOT NULL ORDER BY date DESC LIMIT 200"
                ).fetchall()
                conn.close()
                if len(rows) >= 20:
                    preds   = [[50,50,50,50]] * len(rows)  # 개별 모델 점수 근사
                    actuals = [int(r[2]) for r in rows]
                    em = EnsembleModel()
                    em.update_stacking_weights(preds, actuals)
                    print(f'스태킹 가중치 업데이트 완료 ({len(rows)}건)')
        except Exception as e:
            print(f'[주의] 스태킹 업데이트: {e}')

        # ── 텔레그램 전송 ──────────────────────────────────────────
        if tg_token and tg_chat_id:
            import requests as req
            from datetime import datetime

            def send_tg(msg):
                url = f'https://api.telegram.org/bot{tg_token}/sendMessage'
                try:
                    resp = req.post(url, json={
                        'chat_id': tg_chat_id,
                        'text': msg,
                        'parse_mode': 'HTML'
                    }, timeout=10)
                    return resp.status_code
                except Exception as e:
                    print(f'텔레그램 전송 실패: {e}')
                    return 0

            today = datetime.now().strftime('%Y-%m-%d')
            hour  = datetime.now().hour

            # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            # ① 장 시작 알림 개선 (06:30 전송)
            # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            market_header = []

            # 시장 국면
            try:
                from utils.market_phase import MarketPhase
                pr = MarketPhase().detect(market='KOSPI')
                phase_name = pr[0] if isinstance(pr, tuple) else str(pr)
                phase_icon = '🚀' if '강세' in phase_name else '🛡️' if '약세' in phase_name else '➡️'
                market_header.append(f'{phase_icon} 시장국면: {phase_name}')
            except Exception:
                market_header.append('➡️ 시장국면: 분석중')

            # 공포탐욕 지수
            try:
                from utils.macro_indicators import MacroIndicators
                mi2 = MacroIndicators()
                md2 = mi2.fetch()
                fg  = mi2.get_fear_greed(md2)
                fg_score = fg.get('score', 50)
                fg_label = fg.get('label', '중립')
                fg_icon  = '😱' if fg_score < 25 else '😰' if fg_score < 45 else '😐' if fg_score < 55 else '😊' if fg_score < 75 else '🤑'
                market_header.append(f'{fg_icon} 공포탐욕: {fg_label} ({fg_score:.0f}점)')
            except Exception:
                market_header.append('😐 공포탐욕: 분석중')

            # TOP3 섹터
            try:
                from utils.sector_analysis import SectorAnalysis
                sa2      = SectorAnalysis()
                rotation = sa2.get_rotation_strategy(df)
                top3     = rotation.get('top3_sectors', [])
                if top3:
                    market_header.append(f'🏭 강세섹터: {" > ".join(top3[:3])}')
            except Exception:
                pass

            # 오늘의 특이 공시
            try:
                dart_hot = df[df['dart_score'] >= 70]['name'].tolist()[:3]
                if dart_hot:
                    market_header.append(f'📋 주목공시: {", ".join(dart_hot)}')
            except Exception:
                pass

            # 외국인 연속 순매수 TOP3
            try:
                if 'foreign_consec' in df.columns:
                    frgn_top = df[df['foreign_consec'] >= 3].nlargest(3, 'foreign_consec')
                    if len(frgn_top) > 0:
                        frgn_list = [f"{r['name']}({int(r['foreign_consec'])}일)" 
                                     for _, r in frgn_top.iterrows()]
                        market_header.append(f'🔥 외국인연속매수: {", ".join(frgn_list)}')
            except Exception:
                pass

            # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            # ② TOP5 예측 종목
            # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            top5  = df.head(5)
            lines = [f'📈 <b>오늘의 TOP5 예측 종목</b> ({today})']
            if market_header:
                lines.append('')
                lines.extend(market_header)
            lines.append('')

            for i, (_, row) in enumerate(top5.iterrows(), 1):
                name   = str(row.get('name', ''))
                prob   = float(row.get('rise_prob', 0))
                price  = int(float(row.get('current_price', 0) or 0))
                target = int(float(row.get('target_price', 0) or 0))
                stop   = int(float(row.get('stop_price', 0) or 0))
                sector = str(row.get('sector', ''))
                theme  = str(row.get('theme_tag', ''))
                elli   = str(row.get('elliott_wave_pos', ''))
                cnn    = str(row.get('cnn_pattern', ''))
                frgn   = row.get('foreign_consec', 0)

                line = (
                    f'<b>{i}. {name}</b>\n'
                    f'   📊 상승확률: {prob:.1f}%\n'
                    f'   💰 현재가: {price:,}원\n'
                    f'   🎯 목표가: {target:,}원\n'
                    f'   🛡️ 손절가: {stop:,}원\n'
                )
                if sector and sector not in ['기타', 'nan', '', 'ETF/인덱스']:
                    line += f'   🏭 섹터: {sector}\n'
                if theme and theme not in ['nan', '']:
                    line += f'   🏷️ 테마: {theme}\n'
                try:
                    roe = float(row.get('roe', 0) or 0)
                    if roe != 0:
                        line += f'   📈 ROE: {roe:.1f}%\n'
                except Exception:
                    pass
                if elli and elli not in ['데이터부족', 'nan', '']:
                    line += f'   🌊 파동: {elli}\n'
                if cnn and cnn not in ['없음', 'nan', '']:
                    line += f'   📐 패턴: {cnn}\n'
                try:
                    fc = int(float(str(frgn).split('.')[0]))
                    if fc >= 3:
                        line += f'   🔥 외국인: {fc}일 연속 순매수\n'
                    elif fc <= -3:
                        line += f'   ⚠️ 외국인: {abs(fc)}일 연속 순매도\n'
                except Exception:
                    pass
                lines.append(line)

            # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            # ③ 자기학습 통계 + 마일스톤 알림
            # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            total     = stats["total"]
            hit_rate  = stats["hit_rate"]
            avg_ret   = stats["avg_return"]

            lines.append(f'\n━━━━━━━━━━━━━━━━━━')
            lines.append(f'✅ 자기학습 누적: {total}건')
            lines.append(f'🎯 적중률: {hit_rate}%')
            lines.append(f'💰 평균수익: {avg_ret:+.2f}%')

            # 마일스톤 달성 알림
            milestones = {
                50:   '🎉 50건 달성! 베이지안 최적화 시작!',
                100:  '🎉 100건 달성! 학습 가속화 중!',
                200:  '🎉 200건 달성! 섹터별 분리학습 시작!',
                300:  '🎉 300건 달성! 패턴 정밀화 중!',
                500:  '🎉 500건 달성! 고급 패턴 학습 완료!',
                1000: '🏆 1000건 달성! 개인화 모드 시작!',
                2000: '🏆 2000건 달성! 최고 정확도 모드!',
            }
            for milestone, msg_ms in milestones.items():
                # 이번 실행에서 마일스톤 달성 시
                prev_total = total - saved
                if prev_total < milestone <= total:
                    lines.append(f'\n{msg_ms}')

            # 적중률 변화 알림
            if hit_rate >= 75:
                lines.append(f'🌟 적중률 {hit_rate}% 달성! 최고 성능!')
            elif hit_rate >= 70:
                lines.append(f'✨ 적중률 {hit_rate}% - 우수한 성능 유지 중')

            msg = '\n'.join(lines)
            status = send_tg(msg)
            print(f'텔레그램 TOP5 전송 완료! status={status}')

            # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            # ④ 텔레그램 양방향 대화 (메시지 수신 처리)
            # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            try:
                # 미처리 메시지 확인
                upd_url = f'https://api.telegram.org/bot{tg_token}/getUpdates'
                upd_resp = req.get(upd_url, params={'timeout': 0}, timeout=5)
                updates  = upd_resp.json().get('result', [])

                if updates:
                    last_update_id = updates[-1]['update_id']
                    # 처리 후 offset 업데이트
                    req.get(upd_url, params={'offset': last_update_id + 1}, timeout=5)

                    for upd in updates[-5:]:  # 최근 5개만 처리
                        msg_obj = upd.get('message', {})
                        text    = msg_obj.get('text', '').strip().lower()
                        if not text:
                            continue

                        reply = ''

                        # 명령어 처리
                        if text in ['top3', 'top5', '탑3', '탑5', '오늘탑', '오늘 top']:
                            top_lines = [f'📊 <b>현재 TOP5</b>\n']
                            for i, (_, row) in enumerate(df.head(5).iterrows(), 1):
                                top_lines.append(
                                    f'{i}. {row["name"]} '
                                    f'({float(row.get("rise_prob",0)):.1f}%)'
                                )
                            reply = '\n'.join(top_lines)

                        elif text in ['시장', '시장어때', '시장 어때', '국면']:
                            reply = f'📊 <b>현재 시장 현황</b>\n\n'
                            reply += '\n'.join(market_header) if market_header else '분석중'

                        elif text in ['학습', '자기학습', '누적', '적중률']:
                            reply = (
                                f'🧬 <b>자기학습 현황</b>\n\n'
                                f'✅ 누적: {total}건\n'
                                f'🎯 적중률: {hit_rate}%\n'
                                f'💰 평균수익: {avg_ret:+.2f}%\n'
                            )
                            if total < 200:
                                reply += f'\n📌 {200-total}건 더 쌓이면 섹터별 학습 시작!'
                            elif total < 1000:
                                reply += f'\n📌 {1000-total}건 더 쌓이면 개인화 시작!'
                            else:
                                reply += '\n🏆 개인화 모드 활성화!'

                        elif text in ['도움말', 'help', '?', '명령어']:
                            reply = (
                                '📋 <b>사용 가능한 명령어</b>\n\n'
                                '📈 top3 / top5 → 현재 TOP 종목\n'
                                '📊 시장 → 시장 현황\n'
                                '🧬 학습 → 자기학습 현황\n'
                                '❓ 도움말 → 명령어 목록\n'
                            )

                        # 종목명 검색 (df에서 찾기)
                        # "삼성전자 분석", "삼성전자 어때" 등 다양한 입력 처리
                        else:
                            # 불필요한 단어 제거 후 검색
                            clean = text.replace('분석','').replace('어때','').replace('점수','').replace('예측','').replace('알려줘','').replace('?','').strip()
                            found = df[df['name'].str.contains(clean, case=False, na=False)] if clean else pd.DataFrame()
                            if len(found) > 0:
                                row = found.iloc[0]
                                reply = (
                                    f'🔍 <b>{row["name"]} 분석 결과</b>\n\n'
                                    f'📊 상승확률: {float(row.get("rise_prob",0)):.1f}%\n'
                                    f'💰 현재가: {int(float(row.get("current_price",0) or 0)):,}원\n'
                                    f'🎯 목표가: {int(float(row.get("target_price",0) or 0)):,}원\n'
                                    f'🛡️ 손절가: {int(float(row.get("stop_price",0) or 0)):,}원\n'
                                )
                                sec = str(row.get("sector",""))
                                thm = str(row.get("theme_tag",""))
                                if sec and sec not in ["기타","nan","","ETF/인덱스"]:
                                    reply += f'🏭 섹터: {sec}\n'
                                if thm and thm not in ["nan",""]:
                                    reply += f'🏷️ 테마: {thm}\n'

                        if reply:
                            send_tg(reply)
                            print(f'텔레그램 답변 전송: {text[:20]}')

            except Exception as e:
                print(f'[주의] 텔레그램 양방향: {e}')
        PYEOF

    - name: 자기학습 DB 자동 커밋
      if: always()
      continue-on-error: true
      run: |
        git config --global user.email "action@github.com"
        git config --global user.name "GitHub Actions"
        mkdir -p .cache
        git add -f .cache/learning.db 2>/dev/null || true
        git add -f .cache/bayesian_state.json 2>/dev/null || true
        git add -f .cache/rl_state.json 2>/dev/null || true
        git add -f .cache/stacking_weights.json 2>/dev/null || true
        git add -f .cache/meta_weights.json 2>/dev/null || true
        if git diff --staged --quiet; then
          echo "변경사항 없음 - 커밋 스킵"
        else
          git commit -m "자기학습 DB 자동 업데이트 $(date '+%Y-%m-%d %H:%M')"
          git push origin HEAD:master || echo "⚠️ push 실패 - 권한 확인 필요 (분석은 정상완료)"
          echo "✅ 자기학습 DB 커밋 시도 완료"
        fi